# nite-eval master configuration

target:
  base_url: "http://127.0.0.1:9070"
  llama_swap_config: "config/llama_swap_config.yaml"

judge:
  base_url: "http://127.0.0.1:9091/v1"  # fallback if per-judge URLs not set
  flow_judge_model: "flow-judge"
  flow_judge_url: "http://127.0.0.1:9092/v1"
  reward_anything_model: "reward-anything"
  reward_anything_url: "http://127.0.0.1:9091/v1"
  temperature: 0.1
  max_tokens: 2048

models:
  - name: "qwen3.5-27b"
    backend: "llama.cpp"
  - name: "qwen3.5-9b"
    backend: "llama.cpp"
  - name: "gemma4-26b-a4b"
    backend: "llama.cpp"

evaluation:
  temperature: 0.0
  max_tokens: 2048
  warm_up: true  # Send a warm-up prompt after each model swap

scoring:
  dimension_weights:
    research: 0.25
    planning: 0.25
    coding: 0.25
    agentic: 0.25

results:
  dir: "results/runs"
  db_name: "eval_results.db"

hardware:
  # Default GPU indices; override via NITE_TARGET_GPU / NITE_JUDGE_GPU env vars.
  # Binary paths come from the .env file (LLAMA_SERVER_BIN, LLAMA_SWAP_BIN).
  target_gpu: 0
  judge_gpu: 1

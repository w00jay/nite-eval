# llama-swap configuration for nite-eval judge models
# GPU 1 (RTX 3060) — one judge loaded at a time, swapped by dimension routing

models:
  "flow-judge":
    cmd: >
      /home/woojay/P/llama.cpp/build/bin/llama-server
      -m /home/woojay/models/Flow-Judge-v0.1.Q6_K.gguf
      --port ${PORT} -ngl 999 --ctx-size 8192
      -fa on --no-webui
    group: "judge-gpu"

  "reward-anything":
    cmd: >
      /home/woojay/P/llama.cpp/build/bin/llama-server
      -m /home/woojay/models/RewardAnything-8B-v1.Q6_K.gguf
      --port ${PORT} -ngl 999 --ctx-size 8192
      -fa on --no-webui
    group: "judge-gpu"

groups:
  "judge-gpu":
    exclusive: true

# llama-swap configuration for nite-eval target models.
# Copy this file to `config/llama_swap_config.yaml` and edit the absolute paths
# below for your machine. The live file is gitignored.
#
# - Replace /ABS/PATH/TO/llama.cpp with your llama.cpp checkout.
# - Replace /ABS/PATH/TO/gguf with the directory holding your target GGUFs.
# - Replace GPU-XXXX... with the UUID of your target GPU (`nvidia-smi -L`),
#   or drop the `env CUDA_VISIBLE_DEVICES=...` prefix and pin via the launcher.

models:
  "qwen3.5-27b":
    cmd: >
      env CUDA_VISIBLE_DEVICES=GPU-XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
      /ABS/PATH/TO/llama.cpp/build/bin/llama-server
      -m /ABS/PATH/TO/gguf/Qwen3.5-27B.Q4_K_M.gguf
      --port ${PORT} -ngl 999 --ctx-size 8192
      -fa on --cache-type-k q8_0 --cache-type-v q8_0 --no-webui --metrics
    group: "target-gpu"

  "qwen3.5-9b":
    cmd: >
      env CUDA_VISIBLE_DEVICES=GPU-XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
      /ABS/PATH/TO/llama.cpp/build/bin/llama-server
      -m /ABS/PATH/TO/gguf/Qwen3.5-9B-Q4_K_M.gguf
      --port ${PORT} -ngl 999 --ctx-size 8192
      -fa on --cache-type-k q8_0 --cache-type-v q8_0 --no-webui --metrics
    group: "target-gpu"

  "gemma4-26b-a4b":
    cmd: >
      env CUDA_VISIBLE_DEVICES=GPU-XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
      /ABS/PATH/TO/llama.cpp/build/bin/llama-server
      -m /ABS/PATH/TO/gguf/gemma-4-26b-a4b-it-Q4_K_M.gguf
      --port ${PORT} -ngl 999 --ctx-size 8192
      -fa on --cache-type-k q8_0 --cache-type-v q8_0 --no-webui --metrics
    group: "target-gpu"

groups:
  "target-gpu":
    exclusive: true

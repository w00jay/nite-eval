agentic_tasks:

  # --- Derived from: Wooj-brain thought capture workflow ---
  - id: agentic_brain_easy_01
    dimension: agentic
    difficulty: easy
    source_project: wooj-brain
    description: >
      Capture a thought to Wooj-brain and then search for related thoughts.
      Tests basic two-step tool chaining with correct argument construction.
    system_prompt: |
      You are a personal knowledge assistant. You have access to the user's
      thought capture system (Wooj-brain) for saving and searching ideas.
    tools:
      - type: function
        function:
          name: capture_thought
          description: "Save a new thought to Wooj-brain"
          parameters:
            type: object
            properties:
              content: {type: string, description: "The thought content"}
              type: {type: string, enum: ["idea", "observation", "question", "decision", "reference"]}
              topics: {type: array, items: {type: string}, description: "Topic tags"}
            required: [content, type]
      - type: function
        function:
          name: search_thoughts
          description: "Search captured thoughts by meaning"
          parameters:
            type: object
            properties:
              query: {type: string, description: "Semantic search query"}
              limit: {type: integer, default: 5}
            required: [query]
      - type: function
        function:
          name: send_email  # Distractor
          description: "Send an email"
          parameters:
            type: object
            properties:
              to: {type: string}
              subject: {type: string}
              body: {type: string}
            required: [to, subject, body]
    user_message: >
      I just realized that the autoresearch pattern could be applied to my
      MCP gateway — the eval metric would be tool-call routing latency.
      Save this insight and then find any related thoughts I've had about
      evaluation or testing patterns.
    mock_responses:
      capture_thought:
        - match: {content_contains: "autoresearch"}
          response: {content: {id: "thought_123", status: "saved"}}
      search_thoughts:
        - match: {query_contains: "eval"}
          response:
            content:
              results:
                - {id: "thought_089", content: "Need a consistent way to benchmark local LLM performance across models", type: "question", topics: ["llm", "evaluation"]}
                - {id: "thought_045", content: "Karpathy's key insight: the fixed eval is what makes the agent loop work", type: "observation", topics: ["autoresearch", "agent-loop"]}
    expected_tool_sequence:
      - name: capture_thought
        args_must_contain:
          content: ["autoresearch", "mcp gateway", "latency"]
          type: "idea"
      - name: search_thoughts
        args_must_contain:
          query: ["eval", "test"]
    scoring:
      tool_selection:
        weight: 0.3
        method: sequence_match
        criteria: "Called capture_thought then search_thoughts, NOT send_email"
      argument_accuracy:
        weight: 0.3
        method: partial_match
        criteria: "Thought content captures the key insight. Type is 'idea'. Search query is relevant."
      synthesis:
        weight: 0.2
        method: judge_rubric
        criteria: "Connects the search results back to the user's insight meaningfully"
      distractor_avoidance:
        weight: 0.2
        method: deterministic
        criteria: "Did not call send_email"
    max_turns: 6
    timeout_seconds: 60

  # --- Derived from: Wine Tracker recommendation flow ---
  - id: agentic_wine_medium_01
    dimension: agentic
    difficulty: medium
    source_project: wine-tracker
    description: >
      Multi-step wine recommendation: query cellar inventory, check drinking
      windows, cross-reference taste profile, and produce a recommendation.
      Mirrors the structured-context-over-raw-prompts pattern.
    system_prompt: |
      You are a wine cellar assistant with access to the user's inventory,
      taste profile, and environmental data. You follow the principle:
      query structured data → assemble context → reason → recommend.
    tools:
      - type: function
        function:
          name: query_inventory
          description: "Search the user's wine inventory"
          parameters:
            type: object
            properties:
              filters: 
                type: object
                properties:
                  wine_type: {type: string, enum: ["red", "white", "rosé", "sparkling"]}
                  region: {type: string}
                  min_vintage: {type: integer}
                  max_vintage: {type: integer}
                  status: {type: string, enum: ["in_cellar", "consumed"]}
            required: [filters]
      - type: function
        function:
          name: check_drinking_window
          description: "Get drinking window info for specific bottles"
          parameters:
            type: object
            properties:
              bottle_ids: {type: array, items: {type: string}}
            required: [bottle_ids]
      - type: function
        function:
          name: get_taste_profile
          description: "Get the user's taste preferences and history"
          parameters:
            type: object
            properties: {}
      - type: function
        function:
          name: get_sensor_data
          description: "Get current cellar environmental conditions"
          parameters:
            type: object
            properties:
              cellar_id: {type: string}
            required: [cellar_id]
      - type: function
        function:
          name: get_rack_position
          description: "Get the physical location of a bottle in the rack"
          parameters:
            type: object
            properties:
              bottle_id: {type: string}
            required: [bottle_id]
    user_message: >
      I'm grilling salmon tonight for 4 people. What should I open from my cellar?
    mock_responses:
      query_inventory:
        - match: {filters: {wine_type: "white", status: "in_cellar"}}
          response:
            content:
              bottles:
                - {id: "b001", wine: "2022 Cloudy Bay Sauvignon Blanc", region: "Marlborough", vintage: 2022}
                - {id: "b002", wine: "2020 Domaine Weinbach Riesling Grand Cru", region: "Alsace", vintage: 2020}
                - {id: "b003", wine: "2021 Cakebread Chardonnay", region: "Napa Valley", vintage: 2021}
        - match: {filters: {wine_type: "rosé", status: "in_cellar"}}
          response:
            content:
              bottles:
                - {id: "b004", wine: "2023 Whispering Angel Rosé", region: "Provence", vintage: 2023}
        - match: {filters: {wine_type: "red", status: "in_cellar"}}
          response:
            content:
              bottles:
                - {id: "b005", wine: "2019 Meiomi Pinot Noir", region: "California", vintage: 2019}
                - {id: "b006", wine: "2018 Tignanello", region: "Tuscany", vintage: 2018}
      check_drinking_window:
        - match: {bottle_ids_contains: "b001"}
          response:
            content:
              windows:
                - {bottle_id: "b001", status: "drink_now", peak_start: 2023, peak_end: 2025}
                - {bottle_id: "b002", status: "approaching_peak", peak_start: 2025, peak_end: 2032}
                - {bottle_id: "b003", status: "drink_now", peak_start: 2023, peak_end: 2026}
      get_taste_profile:
        - match: {}
          response:
            content:
              preferences:
                preferred_styles: ["crisp whites", "medium-bodied reds"]
                disliked: ["heavily oaked chardonnay"]
                recent_favorites: ["Sancerre", "Grüner Veltliner", "Oregon Pinot"]
      get_rack_position:
        - match: {bottle_id: "b001"}
          response: {content: {rack: "A", position: "A3"}}
        - match: {bottle_id: "b002"}
          response: {content: {rack: "B", position: "B7"}}
    expected_tool_sequence_flexible: true  # Order may vary, but all must be called
    expected_tools_called:
      - query_inventory  # At least once for white/rosé
      - check_drinking_window
      - get_taste_profile
      - get_rack_position  # For the recommended bottle
    scoring:
      tool_coverage:
        weight: 0.25
        method: subset_match
        criteria: "Called query_inventory, check_drinking_window, get_taste_profile, and get_rack_position"
      reasoning_quality:
        weight: 0.3
        method: judge_rubric
        criteria: >
          Recommendation accounts for: salmon pairing (white/rosé/light red),
          drinking window (prioritize drink_now), taste profile (dislikes oaked
          chardonnay → should not recommend b003 strongly), and provides rack
          location ("pull from A3").
      context_assembly:
        weight: 0.25
        method: judge_rubric
        criteria: >
          Follows the structured-context pattern: gathers data first, then
          reasons over it. Does not hallucinate wines not in the inventory.
      practical_output:
        weight: 0.2
        method: judge_rubric
        criteria: >
          Final recommendation is specific (1-2 bottles), includes rack position,
          and briefly explains why. Not a generic wine pairing lecture.
    max_turns: 12
    timeout_seconds: 120


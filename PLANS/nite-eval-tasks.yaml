  # --- Derived from: Artemis II tracker backend proxy ---
  - id: coding_artemis_medium_01
    dimension: coding
    difficulty: medium
    source_project: artemis-tracker
    description: >
      Write a Python backend proxy that queries the JPL Horizons API for
      Artemis II position vectors and caches results. Handles the
      text-inside-JSON parsing quirk of the Horizons API.
    system_prompt: |
      You are a Python developer building scientific data APIs.
    tools:
      - type: function
        function:
          name: write_file
          description: "Write content to a file"
          parameters:
            type: object
            properties:
              path: {type: string}
              content: {type: string}
            required: [path, content]
      - type: function
        function:
          name: run_tests
          description: "Run pytest"
          parameters:
            type: object
            properties:
              directory: {type: string}
              verbose: {type: boolean}
            required: [directory]
      - type: function
        function:
          name: run_code
          description: "Run a shell command"
          parameters:
            type: object
            properties:
              command: {type: string}
            required: [command]
    user_message: >
      Write a Python module that: (1) queries JPL Horizons API for Artemis II
      (COMMAND='-1024') position vectors (EPHEM_TYPE='VECTORS', CENTER='500@399'
      for geocentric), (2) parses the text-inside-JSON response format (Horizons
      returns a JSON wrapper around plain-text ephemeris data with $$SOE/$$EOE
      delimiters), (3) extracts X, Y, Z position and VX, VY, VZ velocity for
      each time step, (4) implements a TTL-based cache (5 min for recent data,
      1 hour for historical), (5) exposes a clean get_position(time) function.
      Use httpx for async HTTP. Include tests with a mock Horizons response.
    test_suite:
      language: python
      tests:
        - name: "test_parse_horizons_response"
          expected: "Correctly extracts vectors from $$SOE/$$EOE delimited text"
        - name: "test_cache_hit"
          expected: "Returns cached data without HTTP call on second request"
        - name: "test_cache_ttl_expiry"
          expected: "Re-fetches after TTL expires"
        - name: "test_api_error_handling"
          expected: "Raises descriptive error on API failure"
        - name: "test_get_position_interpolation"
          expected: "Returns interpolated position for times between data points"
    scoring:
      test_pass_rate:
        weight: 0.4
        method: automated
      parsing_correctness:
        weight: 0.25
        method: deterministic
        criteria: "Correctly handles $$SOE/$$EOE format, whitespace, multi-line records"
      code_quality:
        weight: 0.2
        method: judge_rubric
        criteria: "Type hints, async/await pattern, proper error types, docstrings"
      cache_design:
        weight: 0.15
        method: judge_rubric
        criteria: "TTL logic is correct, thread-safe, doesn't leak memory"
    max_turns: 10
    timeout_seconds: 120

  # --- Derived from: MCP Gateway Go HTTP proxy with tool routing ---
  - id: coding_mcp_hard_01
    dimension: coding
    difficulty: hard
    source_project: mcp-gateway
    description: >
      Implement the core MCP gateway proxy in Go: an HTTP server that receives
      MCP tools/list and tools/call requests, routes to the correct upstream
      server based on tool name, injects auth, and returns aggregated results.
    system_prompt: |
      You are a senior Go developer building a production proxy service.
    tools:
      - type: function
        function:
          name: write_file
          description: "Write content to a file"
          parameters:
            type: object
            properties:
              path: {type: string}
              content: {type: string}
            required: [path, content]
      - type: function
        function:
          name: read_file
          description: "Read a file"
          parameters:
            type: object
            properties:
              path: {type: string}
            required: [path]
      - type: function
        function:
          name: run_tests
          description: "Run Go tests"
          parameters:
            type: object
            properties:
              directory: {type: string}
              verbose: {type: boolean}
              race: {type: boolean, description: "Enable race detector"}
            required: [directory]
      - type: function
        function:
          name: run_code
          description: "Run a shell command"
          parameters:
            type: object
            properties:
              command: {type: string}
            required: [command]
    user_message: >
      Implement the core MCP gateway proxy in Go. Requirements:
      (1) HTTP server on :8080 with two endpoints: POST /mcp/tools/list and
      POST /mcp/tools/call.
      (2) tools/list aggregates tools from all configured upstream servers
      (fetched concurrently with errgroup), deduplicates by tool name, and
      returns the merged list.
      (3) tools/call looks up which upstream owns the requested tool, injects
      the appropriate auth header (Bearer, X-API-Key, or OAuth2 based on config),
      proxies the request, and returns the response.
      (4) Structured JSON logging via slog for every proxied request (server,
      tool, latency, status).
      (5) Graceful shutdown on SIGTERM.
      Load server config from the YAML format we defined earlier.
      Include tests with httptest for both endpoints, and run with -race.
    test_suite:
      language: go
      tests:
        - name: "TestToolsListAggregation"
          expected: "Merges tools from 2+ upstream servers, no duplicates"
        - name: "TestToolsCallRouting"
          expected: "Routes to correct upstream based on tool name"
        - name: "TestAuthInjection_Bearer"
          expected: "Adds Authorization: Bearer header for bearer auth type"
        - name: "TestAuthInjection_APIKey"
          expected: "Adds X-API-Key header for api_key auth type"
        - name: "TestUnknownTool"
          expected: "Returns 404 with descriptive error for unknown tool"
        - name: "TestUpstreamTimeout"
          expected: "Returns 504 when upstream doesn't respond within timeout"
        - name: "TestConcurrentToolsList"
          expected: "Fetches from all upstreams concurrently, no race conditions"
        - name: "TestStructuredLogging"
          expected: "Log entries contain server, tool, latency_ms, status fields"
    scoring:
      test_pass_rate:
        weight: 0.35
        method: automated
      race_detector_clean:
        weight: 0.15
        method: automated
        criteria: "go test -race passes with no data races"
      code_quality:
        weight: 0.25
        method: judge_rubric
        criteria: >
          Production Go patterns: context propagation, errgroup for concurrency,
          proper HTTP client reuse, structured logging with slog, no goroutine
          leaks, graceful shutdown.
      architecture:
        weight: 0.25
        method: judge_rubric
        criteria: >
          Clean separation: config, router, proxy, logging as distinct packages
          or clear internal boundaries. Handler functions are testable without
          starting a real server.
    max_turns: 14
    timeout_seconds: 180



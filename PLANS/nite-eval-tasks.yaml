              limit: {type: integer, default: 5}
            required: [query]
      - type: function
        function:
          name: get_macro_indicators
          description: "Get current macro economic indicators"
          parameters:
            type: object
            properties:
              indicators: {type: array, items: {type: string, enum: ["fed_funds_rate", "cpi", "pmi", "vix", "yield_curve", "unemployment"]}}
            required: [indicators]
      - type: function
        function:
          name: calculate_position_size
          description: "Calculate recommended position size based on risk parameters"
          parameters:
            type: object
            properties:
              symbol: {type: string}
              entry_price: {type: number}
              stop_loss: {type: number}
              portfolio_value: {type: number}
              max_risk_pct: {type: number, default: 0.02}
            required: [symbol, entry_price, stop_loss, portfolio_value]
      - type: function
        function:
          name: social_media_sentiment  # Low-signal distractor
          description: "Get social media sentiment from Reddit/Twitter"
          parameters:
            type: object
            properties:
              ticker: {type: string}
            required: [ticker]
    user_message: >
      Analyze NVDA for a potential swing trade entry. I have a $100K portfolio
      and standard 2% risk per trade. Give me a full analysis with entry, stop,
      target, and position size — but only if the setup is actually good.
      Don't force a trade if the data doesn't support it.
    mock_responses:
      get_price_data:
        - match: {symbol: "NVDA", period: "3mo"}
          response:
            content:
              current_price: 142.50
              high_52w: 156.80
              low_52w: 85.40
              avg_volume: 45000000
              recent_trend: "Pulled back 9% from highs over 2 weeks"
      get_technical_indicators:
        - match: {symbol: "NVDA"}
          response:
            content:
              rsi: 38.5
              macd: {value: -1.2, signal: -0.8, histogram: -0.4}
              bollinger: {upper: 155, middle: 145, lower: 135, position: "near_lower"}
              sma_50: 148.20
              sma_200: 128.50
              atr: 5.80
      search_news:
        - match: {query_contains: "NVDA"}
          response:
            content:
              articles:
                - {title: "NVIDIA Data Center Revenue Beats Expectations", sentiment: 0.8, date: "2026-03-28"}
                - {title: "Export Controls Tightened on AI Chips to China", sentiment: -0.6, date: "2026-04-01"}
                - {title: "NVIDIA Announces Next-Gen Blackwell Ultra Architecture", sentiment: 0.7, date: "2026-04-03"}
      rag_search:
        - match: {query_contains: "NVDA earnings"}
          response:
            content:
              documents:
                - {type: "earnings_transcript", date: "2026-02-26", excerpt: "Data center revenue grew 65% YoY. CEO highlighted sovereign AI demand. Guided Q2 revenue $44B ± 2%, above consensus."}
                - {type: "analyst_report", date: "2026-03-15", excerpt: "Maintain Overweight. PT $175. Key risk: China export restrictions could impact 12-15% of data center revenue."}
      get_macro_indicators:
        - match: {indicators_contains: "vix"}
          response:
            content:
              fed_funds_rate: {value: 4.25, trend: "holding"}
              vix: {value: 18.5, trend: "slightly_elevated"}
              yield_curve: {spread: 0.15, status: "mildly_positive"}
      calculate_position_size:
        - match: {symbol: "NVDA"}
          response:
            content:
              position_size: 345
              dollar_value: 49162.50
              risk_amount: 2000
              reward_risk_ratio: 2.3
      social_media_sentiment:
        - match: {ticker: "NVDA"}
          response:
            content:
              reddit_sentiment: 0.72
              twitter_mentions: 45000
              wsb_mentions: 1200
    expected_tools_called:
      - get_price_data
      - get_technical_indicators
      - search_news
      - rag_search
      - get_macro_indicators
      - calculate_position_size
    scoring:
      tool_coverage:
        weight: 0.2
        method: subset_match
        criteria: >
          Called all 5 core tools (price, technicals, news, RAG, macro).
          Position sizing optional (depends on whether setup is recommended).
      analysis_structure:
        weight: 0.25
        method: judge_rubric
        criteria: >
          Follows systematic process: quantitative → qualitative → macro → synthesis.
          Each section references specific data from tool responses.
      judgment_quality:
        weight: 0.25
        method: judge_rubric
        criteria: >
          Makes a clear recommendation (long/short/wait) with explicit reasoning.
          Addresses the conflicting signals (strong fundamentals vs export risk vs
          technical pullback). States confidence level. If recommending entry,
          provides specific price levels.
      data_accuracy:
        weight: 0.15
        method: deterministic
        criteria: >
          All numbers cited (RSI, price, ATR, revenue growth) match mock data.
          No hallucinated statistics.
      distractor_handling:
        weight: 0.15
        method: deterministic
        criteria: >
          Either did not call social_media_sentiment (preferred — low signal
          for institutional-quality analysis) or appropriately discounted it.
          Did NOT weight Reddit sentiment as a primary signal.
    max_turns: 16
    timeout_seconds: 180

  # --- Derived from: MCP Gateway error recovery during tool routing ---
  - id: agentic_mcp_hard_01
    dimension: agentic
    difficulty: hard
    source_project: mcp-gateway
    description: >
      Debug a failing MCP tool call chain: the initial tool call fails due
      to an auth error, requiring the agent to diagnose the issue, refresh
      credentials, retry, and then complete the original task. Tests error
      recovery, context maintenance across retries, and diagnostic reasoning.
    system_prompt: |
      You are a developer assistant that helps debug and fix issues with
      MCP server integrations. You have access to gateway management tools
      and can inspect server health, logs, and credentials.
    tools:
      - type: function
        function:
          name: call_mcp_tool
          description: "Call a tool through the MCP gateway"
          parameters:
            type: object
            properties:
              server: {type: string, description: "MCP server name"}
              tool: {type: string, description: "Tool name"}
              arguments: {type: object, description: "Tool arguments"}
            required: [server, tool, arguments]
      - type: function
        function:
          name: check_server_health
          description: "Check the health status of an MCP server"
          parameters:
            type: object
            properties:
              server: {type: string}
            required: [server]
      - type: function
        function:
          name: get_server_logs
          description: "Get recent logs for an MCP server connection"
          parameters:
            type: object
            properties:
              server: {type: string}
              lines: {type: integer, default: 20}
            required: [server]
      - type: function
        function:
          name: refresh_credentials
          description: "Refresh OAuth2 or rotate API credentials for a server"
          parameters:
            type: object
            properties:
              server: {type: string}
              auth_type: {type: string, enum: ["oauth2", "api_key", "bearer"]}
            required: [server, auth_type]
      - type: function
        function:
          name: restart_server
          description: "Restart an MCP server connection"  # Unnecessary for auth issue
          parameters:
            type: object
            properties:
              server: {type: string}
            required: [server]
    user_message: >
      I need to search my Notion workspace for the MCP Gateway design doc,
      but the Notion MCP server seems broken. Can you figure out what's wrong
      and get me that doc?
    mock_responses:
      call_mcp_tool:
        - match: {server: "notion", tool: "search", _call_number: 1}
          response: {error: "401 Unauthorized: Invalid or expired token"}
        - match: {server: "notion", tool: "search", _call_number: 2}
          response:
            content:
              results:
                - {title: "MCP Gateway Design Doc", id: "page_abc123", last_edited: "2026-03-10"}
                - {title: "MCP Gateway POC Scope", id: "page_def456", last_edited: "2026-03-08"}
      check_server_health:
        - match: {server: "notion"}
          response:
            content:
              status: "degraded"
              last_successful_call: "2026-04-03T14:22:00Z"
              error_count_24h: 12
              auth_type: "oauth2"
              token_expiry: "2026-04-03T15:00:00Z"  # Expired
      get_server_logs:
        - match: {server: "notion"}
          response:
            content:
              logs:
                - "2026-04-04T10:15:22Z ERROR auth_injection: OAuth2 token expired for server=notion"
                - "2026-04-04T10:15:22Z ERROR proxy: upstream returned 401 for tool=search server=notion"
                - "2026-04-04T09:30:01Z WARN health_check: server=notion consecutive_failures=3"
      refresh_credentials:
        - match: {server: "notion", auth_type: "oauth2"}
          response:
            content:
              status: "refreshed"
              new_expiry: "2026-04-04T22:15:30Z"
              message: "OAuth2 token refreshed successfully"
    expected_tool_sequence:
      - {name: call_mcp_tool, args: {server: "notion", tool: "search"}}  # Fails
      # Agent should now diagnose rather than blindly retry
      - {name: check_server_health, args: {server: "notion"}}
      - {name: get_server_logs, args: {server: "notion"}}  # Optional but good
      - {name: refresh_credentials, args: {server: "notion", auth_type: "oauth2"}}
      - {name: call_mcp_tool, args: {server: "notion", tool: "search"}}  # Succeeds
    scoring:
      diagnostic_approach:
        weight: 0.3
        method: judge_rubric
        criteria: >
          After the 401 error, the agent investigates (checks health and/or logs)
          rather than blindly retrying or restarting. Correctly identifies the
          expired OAuth2 token as the root cause.
      correct_fix:
        weight: 0.25
        method: deterministic
        criteria: >
          Calls refresh_credentials with auth_type='oauth2' (not api_key or bearer).
          Does NOT call restart_server (wrong fix for an auth issue).
      task_completion:
        weight: 0.25
        method: deterministic
        criteria: "Successfully retries the Notion search after credential refresh and returns the results"
      communication:
        weight: 0.2
        method: judge_rubric
        criteria: >
          Explains what went wrong and what was fixed. Mentions the token
          expiry. Presents the search results clearly.
    max_turns: 12
    timeout_seconds: 120



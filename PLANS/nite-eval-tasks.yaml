# =============================================================================
# LLM Eval Suite — Custom Task Definitions
# Derived from actual project patterns and agent workloads
# =============================================================================
#
# Source projects:
#   - MCP Gateway (Go, proxy architecture, tool registry, CLI)
#   - Wine Inventory Tracker (Supabase, edge functions, computer vision, recommendations)
#   - Artemis II Tracker (API integration, data parsing, 3D visualization, MCP server)
#   - Financial AI Product (RAG, agent orchestration, time series, multi-modal data)
#   - Wooj-brain (knowledge capture, semantic search, Supabase edge functions)
#   - Autoresearch pattern (agent loop design, eval methodology)
#
# Task ID convention: {dimension}_{project}_{difficulty}_{sequence}
# Dimensions: research, planning, coding, agentic
# Difficulty: easy (1 tool / straightforward), medium (2-4 tools / multi-step),
#             hard (5+ tools / long-horizon / ambiguity)
# =============================================================================


# =============================================================================
# DIMENSION 1: RESEARCH TASKS
# Tests: multi-step information gathering, synthesis, comparison, judgment
# =============================================================================

research_tasks:

  # --- Derived from: MCP Gateway competitive analysis ---
  - id: research_mcp_easy_01
    dimension: research
    difficulty: easy
    source_project: mcp-gateway
    description: >
      Compare two open-source MCP gateway implementations (Docker vs Microsoft)
      on transport support, auth model, and deployment complexity.
    system_prompt: |
      You are a technical research assistant helping evaluate infrastructure tools.
    tools:
      - type: function
        function:
          name: web_search
          description: "Search the web for technical information"
          parameters:
            type: object
            properties:
              query: {type: string, description: "Search query"}
            required: [query]
      - type: function
        function:
          name: fetch_url
          description: "Fetch the full content of a URL"
          parameters:
            type: object
            properties:
              url: {type: string, description: "URL to fetch"}
            required: [url]
    user_message: >
      Compare Docker's mcp-gateway and Microsoft's mcp-gateway on these dimensions:
      transport protocols supported, authentication model, and deployment requirements.
      Which is better suited for a small team running on GKE?
    mock_responses:
      web_search:
        - match: {query_contains: "docker mcp-gateway"}
          response:
            content:
              results:
                - title: "docker/mcp-gateway GitHub"
                  snippet: "Go-based MCP proxy. Runs servers in isolated containers. Supports Streamable HTTP. Catalog/registry. Profile-based server grouping. Apache 2.0 license."
                  url: "https://github.com/docker/mcp-gateway"
        - match: {query_contains: "microsoft mcp-gateway"}
          response:
            content:
              results:
                - title: "microsoft/mcp-gateway GitHub"
                  snippet: ".NET-based. K8s-native with session affinity. Control plane for MCP server lifecycle. Enterprise telemetry, access control, observability. Designed for K8s from start."
                  url: "https://github.com/microsoft/mcp-gateway"
    scoring:
      coverage:
        weight: 0.4
        method: checklist
        criteria:
          - "Mentions Docker gateway is Go-based"
          - "Mentions Microsoft gateway is .NET-based"
          - "Compares transport support"
          - "Compares auth approach"
          - "Addresses GKE deployment fit"
      accuracy:
        weight: 0.3
        method: judge_rubric
        criteria: "Claims match mock search results, no hallucinated features"
      recommendation_quality:
        weight: 0.3
        method: judge_rubric
        criteria: "Gives a clear, reasoned recommendation for the GKE use case"
    max_turns: 6
    timeout_seconds: 90

  # --- Derived from: Wine Tracker competitive landscape ---
  - id: research_wine_medium_01
    dimension: research
    difficulty: medium
    source_project: wine-tracker
    description: >
      Research the AI capabilities of three wine cellar apps and identify
      gaps in proactive cellar intelligence. Mirrors the original competitive
      analysis that shaped the Wine Tracker product thesis.
    system_prompt: |
      You are a product research assistant analyzing the wine technology market.
    tools:
      - type: function
        function:
          name: web_search
          description: "Search the web for product information"
          parameters:
            type: object
            properties:
              query: {type: string, description: "Search query"}
            required: [query]
      - type: function
        function:
          name: fetch_url
          description: "Fetch the full content of a URL"
          parameters:
            type: object
            properties:
              url: {type: string, description: "URL to fetch"}
            required: [url]
      - type: function
        function:
          name: summarize_findings
          description: "Store intermediate research findings for later synthesis"
          parameters:
            type: object
            properties:
              topic: {type: string}
              findings: {type: string}
            required: [topic, findings]
    user_message: >
      Research the AI features of Vivino, CellarTracker (including CellarChat),
      and CellarMate.ai. For each, identify: what AI capabilities they offer,
      how deep the personalization goes, and what they're missing in terms of
      proactive cellar intelligence. Synthesize into a gap analysis showing
      where a new entrant could differentiate.
    mock_responses:
      web_search:
        - match: {query_contains: "vivino AI"}
          response:
            content:
              results:
                - title: "Vivino AI Label Scanning"
                  snippet: "70M+ users. Label scanning via computer vision. Community ratings 200M+ reviews. Recommendation based on taste profile from ratings. Pivoted to marketplace/commerce."
        - match: {query_contains: "CellarTracker CellarChat"}
          response:
            content:
              results:
                - title: "CellarTracker Launches CellarChat AI"
                  snippet: "AI assistant connected to personal collection. Suggestions based on owned bottles, drinking windows, community tasting notes. Reactive Q&A format. 1M+ active users, 4.5M wines."
        - match: {query_contains: "CellarMate"}
          response:
            content:
              results:
                - title: "CellarMate.ai Review"
                  snippet: "GPT-4 powered conversational sommelier. 14 specialized wine functions. Photo label scanning. Receipt and restaurant menu scanning. Early stage, thousands of users."
      summarize_findings:
        - match: {topic_contains: "any"}
          response:
            content: {status: "saved"}
    scoring:
      coverage:
        weight: 0.3
        method: checklist
        criteria:
          - "Covers all three apps"
          - "Identifies AI capabilities per app"
          - "Assesses personalization depth"
          - "Identifies proactive vs reactive intelligence gap"
      synthesis:
        weight: 0.4
        method: judge_rubric
        criteria: >
          Produces a coherent gap analysis, not just three separate summaries.
          Identifies cross-cutting themes and a clear differentiation opportunity.
      actionability:
        weight: 0.3
        method: judge_rubric
        criteria: >
          Recommendations are specific enough to inform product decisions,
          not generic platitudes like "use more AI."
    max_turns: 10
    timeout_seconds: 120

  # --- Derived from: Financial AI product research ---
  - id: research_finance_hard_01
    dimension: research
    difficulty: hard
    source_project: financial-ai
    description: >
      Research transformer-based time series models for financial forecasting,
      comparing foundation models (TimesFM, Chronos, Moirai) against
      fine-tuned specialist models (TFT, PatchTST). Requires multi-source
      synthesis and nuanced technical judgment.
    system_prompt: |
      You are a quantitative research assistant specializing in ML for finance.
    tools:
      - type: function
        function:
          name: web_search
          description: "Search the web for academic and technical information"
          parameters:
            type: object
            properties:
              query: {type: string, description: "Search query"}
            required: [query]
      - type: function
        function:
          name: fetch_url
          description: "Fetch the full content of a URL"
          parameters:
            type: object
            properties:
              url: {type: string, description: "URL to fetch"}
            required: [url]
      - type: function
        function:
          name: summarize_findings
          description: "Store intermediate research findings"
          parameters:
            type: object
            properties:
              topic: {type: string}
              findings: {type: string}
            required: [topic, findings]
      - type: function
        function:
          name: create_comparison_table
          description: "Create a structured comparison of options"
          parameters:
            type: object
            properties:
              title: {type: string}
              columns: {type: array, items: {type: string}}
              rows: {type: array, items: {type: object}}
            required: [title, columns, rows]
    user_message: >
      I'm building a multi-asset swing trading system (days to weeks horizon).
      Research the current state of transformer-based time series forecasting
      models. Compare foundation models (TimesFM, Chronos, Moirai, Lag-Llama)
      against fine-tunable architectures (TFT, PatchTST). For my use case:
      which approach is better, and can I fine-tune a foundation model with
      PEFT/LoRA on my own financial data? Include practical deployment
      considerations for a single-GPU setup.
    mock_responses:
      web_search:
        - match: {query_contains: "TimesFM"}
          response:
            content:
              results:
                - title: "TimesFM: Google's Time Series Foundation Model"
                  snippet: "200M param decoder-only. Pre-trained on 100B real-world time points. Zero-shot competitive with supervised models. Supports variable context lengths. Apache 2.0."
        - match: {query_contains: "Chronos"}
          response:
            content:
              results:
                - title: "Chronos: Amazon's Probabilistic Time Series Model"
                  snippet: "T5-based. Tokenizes time series via scaling and quantization. Multiple sizes (20M to 710M). Strong zero-shot. Probabilistic forecasts. Apache 2.0."
        - match: {query_contains: "PatchTST"}
          response:
            content:
              results:
                - title: "PatchTST: Channel-independent Transformer"
                  snippet: "Patches time series like ViT patches images. Self-supervised pre-training. Channel independence enables multi-variate. Strong on long-horizon. IBM Research."
        - match: {query_contains: "financial time series PEFT LoRA"}
          response:
            content:
              results:
                - title: "Fine-tuning Foundation Models for Finance"
                  snippet: "LoRA on TimesFM shows 15-20% improvement on domain-specific financial datasets. Key: freeze base layers, LoRA rank 8-16 sufficient. Risk of overfitting on small financial datasets."
        - match: {query_contains: "Temporal Fusion Transformer"}
          response:
            content:
              results:
                - title: "TFT for Multi-horizon Forecasting"
                  snippet: "Google 2021. Variable selection, temporal attention, multi-horizon output. Interpretable via attention weights. Requires per-dataset training. Strong on structured time series with known covariates."
      summarize_findings:
        - match: {topic_contains: "any"}
          response: {content: {status: "saved"}}
      create_comparison_table:
        - match: {title_contains: "any"}
          response: {content: {status: "table_created"}}
    scoring:
      technical_depth:
        weight: 0.3
        method: judge_rubric
        criteria: >
          Demonstrates understanding of architectural differences (decoder-only
          vs encoder, patching strategy, tokenization approach). Not just
          listing features but explaining trade-offs.
      practical_judgment:
        weight: 0.3
        method: judge_rubric
        criteria: >
          Gives a clear recommendation for the swing trading use case with
          reasoning. Addresses single-GPU deployment constraints. Discusses
          PEFT/LoRA feasibility honestly.
      coverage:
        weight: 0.2
        method: checklist
        criteria:
          - "Covers at least 4 models"
          - "Addresses zero-shot vs fine-tuned trade-off"
          - "Discusses PEFT/LoRA for financial data"
          - "Mentions deployment/inference considerations"
      structure:
        weight: 0.2
        method: judge_rubric
        criteria: "Well-organized with comparison, not a wall of text"
    max_turns: 14
    timeout_seconds: 180


# =============================================================================
# DIMENSION 2: PLANNING TASKS
# Tests: task decomposition, dependency awareness, risk mitigation, specificity
# =============================================================================

planning_tasks:

  # --- Derived from: Wine Tracker 2-week POC scope ---
  - id: planning_wine_easy_01
    dimension: planning
    difficulty: easy
    source_project: wine-tracker
    description: >
      Create a 2-week POC plan for a Supabase-backed wine inventory app
      with label scanning. Tests basic task decomposition and dependency ordering.
    system_prompt: |
      You are a technical project planner for mobile app development.
    tools:
      - type: function
        function:
          name: check_dependency
          description: "Check if a technology or service is compatible with another"
          parameters:
            type: object
            properties:
              tech_a: {type: string}
              tech_b: {type: string}
            required: [tech_a, tech_b]
      - type: function
        function:
          name: estimate_effort
          description: "Estimate development effort for a task"
          parameters:
            type: object
            properties:
              task: {type: string, description: "Task description"}
              stack: {type: string, description: "Tech stack context"}
            required: [task, stack]
    user_message: >
      Plan a 2-week POC for a wine inventory tracker. Stack: Supabase (Postgres,
      Auth, Storage, Edge Functions), React Native mobile app, Claude Vision API
      for label scanning. Core flows: scan label → identify wine → add to
      inventory → place in rack grid → consume bottle. What should I build
      in week 1 vs week 2, and what are the critical path dependencies?
    mock_responses:
      check_dependency:
        - match: {tech_a_contains: "supabase", tech_b_contains: "react native"}
          response: {content: {compatible: true, notes: "Use @supabase/supabase-js. Direct client SDK for reads, functions.invoke for server logic."}}
        - match: {tech_a_contains: "claude vision", tech_b_contains: "edge function"}
          response: {content: {compatible: true, notes: "150s timeout on Supabase edge functions. Claude Vision call typically 3-8s. Fits within limit."}}
      estimate_effort:
        - match: {task_contains: "schema"}
          response: {content: {estimate_hours: 4, complexity: "medium", notes: "Core tables: wines, bottles, racks, rack_positions, events. RLS policies add 2h."}}
        - match: {task_contains: "scan"}
          response: {content: {estimate_hours: 8, complexity: "high", notes: "Image upload, Claude Vision call, wine matching/creation, error handling. Most complex edge function."}}
        - match: {task_contains: "rack grid"}
          response: {content: {estimate_hours: 6, complexity: "medium", notes: "Interactive grid component, drag-to-place, position state management."}}
    scoring:
      dependency_correctness:
        weight: 0.3
        method: deterministic
        criteria: >
          Schema must come before edge functions. Auth must come before
          any user-scoped features. Scan-label must come before consume flow.
      completeness:
        weight: 0.3
        method: checklist
        criteria:
          - "Week 1 includes database schema and auth"
          - "Week 1 includes scan-label edge function"
          - "Week 2 includes recommendation or intelligence features"
          - "Identifies critical path"
      specificity:
        weight: 0.2
        method: judge_rubric
        criteria: "Tasks are concrete and actionable, not vague like 'set up backend'"
      risk_awareness:
        weight: 0.2
        method: judge_rubric
        criteria: "Identifies at least one risk (e.g., Claude Vision accuracy, edge function timeout)"
    max_turns: 8
    timeout_seconds: 90

  # --- Derived from: MCP Gateway POC architecture ---
  - id: planning_mcp_medium_01
    dimension: planning
    difficulty: medium
    source_project: mcp-gateway
    description: >
      Design a migration plan from direct MCP server connections to a
      centralized gateway proxy. Mirrors the actual MCP Gateway architecture
      design work.
    system_prompt: |
      You are a systems architect specializing in developer infrastructure.
    tools:
      - type: function
        function:
          name: get_current_infrastructure
          description: "Get details about the current system setup"
          parameters:
            type: object
            properties:
              component: {type: string, description: "Infrastructure component to query"}
            required: [component]
      - type: function
        function:
          name: check_compatibility
          description: "Check compatibility between systems"
          parameters:
            type: object
            properties:
              source: {type: string}
              target: {type: string}
            required: [source, target]
      - type: function
        function:
          name: estimate_effort
          description: "Estimate migration effort"
          parameters:
            type: object
            properties:
              task: {type: string}
              context: {type: string}
            required: [task]
    user_message: >
      I have 5 MCP servers configured directly in Claude Desktop and Cursor
      (Notion, Gmail, Slack, a custom Supabase MCP, and a GitHub MCP). I want
      to migrate to a centralized MCP gateway that handles auth injection,
      telemetry, and tool discovery. The gateway should be a Go service
      deployable to ECS or GKE. Plan the migration in phases — I can't break
      my current agent workflows during the transition.
    mock_responses:
      get_current_infrastructure:
        - match: {component_contains: "mcp"}
          response:
            content:
              servers:
                - {name: "notion", transport: "sse", auth: "bearer_token"}
                - {name: "gmail", transport: "sse", auth: "oauth2"}
                - {name: "slack", transport: "sse", auth: "bot_token"}
                - {name: "wooj-brain", transport: "http", auth: "api_key"}
                - {name: "github", transport: "sse", auth: "pat"}
              clients: ["claude-desktop", "cursor", "claude-code"]
      check_compatibility:
        - match: {source_contains: "sse", target_contains: "gateway"}
          response: {content: {compatible: true, notes: "Gateway can proxy SSE. Needs buffering for long-lived connections."}}
      estimate_effort:
        - match: {task_contains: "proxy"}
          response: {content: {estimate_days: 3, notes: "Basic Go HTTP proxy with route matching. SSE passthrough adds complexity."}}
        - match: {task_contains: "auth"}
          response: {content: {estimate_days: 2, notes: "Auth injection from config. OAuth2 refresh flow is the hard part."}}
        - match: {task_contains: "telemetry"}
          response: {content: {estimate_days: 1, notes: "OpenTelemetry middleware. Structured JSON logging."}}
    scoring:
      phased_approach:
        weight: 0.3
        method: judge_rubric
        criteria: >
          Plan has clear phases that don't break existing workflows.
          Should include a parallel-run phase where both direct and
          gateway connections work simultaneously.
      dependency_correctness:
        weight: 0.25
        method: deterministic
        criteria: >
          Proxy layer must exist before auth injection. Auth injection
          before telemetry. Client migration after gateway is stable.
      completeness:
        weight: 0.25
        method: checklist
        criteria:
          - "Covers Go proxy service implementation"
          - "Covers auth injection for all 3 auth types (bearer, OAuth2, API key)"
          - "Covers client migration (Claude Desktop, Cursor, Claude Code)"
          - "Covers rollback strategy"
          - "Covers telemetry/observability"
      risk_mitigation:
        weight: 0.2
        method: judge_rubric
        criteria: >
          Identifies risks: OAuth2 token refresh through proxy, SSE
          connection lifecycle, client config migration pain points.
    max_turns: 10
    timeout_seconds: 120

  # --- Derived from: Financial AI system architecture ---
  - id: planning_finance_hard_01
    dimension: planning
    difficulty: hard
    source_project: financial-ai
    description: >
      Design a data pipeline architecture for a multi-asset swing trading
      system that ingests price data, news, earnings transcripts, and macro
      indicators into a unified RAG-ready store.
    system_prompt: |
      You are a data engineering architect for quantitative finance systems.
    tools:
      - type: function
        function:
          name: get_current_infrastructure
          description: "Get current system details"
          parameters:
            type: object
            properties:
              component: {type: string}
            required: [component]
      - type: function
        function:
          name: check_api_availability
          description: "Check if a data API is available and its constraints"
          parameters:
            type: object
            properties:
              api_name: {type: string}
              data_type: {type: string}
            required: [api_name]
      - type: function
        function:
          name: estimate_storage
          description: "Estimate storage requirements"
          parameters:
            type: object
            properties:
              data_type: {type: string}
              volume: {type: string}
              retention: {type: string}
            required: [data_type, volume]
      - type: function
        function:
          name: check_compatibility
          description: "Check compatibility between systems"
          parameters:
            type: object
            properties:
              source: {type: string}
              target: {type: string}
            required: [source, target]
    user_message: >
      Design the data pipeline architecture for my swing trading system. I need
      to ingest: (1) daily OHLCV price data for ~500 instruments across equities,
      FX, rates, and crypto, (2) financial news from 3-4 sources with sentiment,
      (3) quarterly earnings call transcripts with audio, (4) macro indicators
      (Fed funds rate, CPI, PMI, etc.). All data needs to be RAG-ready (embedded
      and searchable). Stack: Python, Supabase (pgvector), with option to add
      dedicated vector DB later. Single developer, so operational simplicity matters.
    mock_responses:
      get_current_infrastructure:
        - match: {component_contains: "supabase"}
          response:
            content:
              plan: "Pro"
              postgres_version: "15"
              extensions: ["pgvector", "pg_trgm"]
              storage_gb: 100
              edge_functions: true
      check_api_availability:
        - match: {api_name_contains: "polygon"}
          response: {content: {available: true, rate_limit: "unlimited with paid plan", cost: "$199/mo starter", data_types: ["stocks", "options", "forex", "crypto"]}}
        - match: {api_name_contains: "alpha vantage"}
          response: {content: {available: true, rate_limit: "75 req/min premium", cost: "$49.99/mo", data_types: ["stocks", "forex", "crypto", "economic indicators"]}}
        - match: {api_name_contains: "newsapi"}
          response: {content: {available: true, rate_limit: "1000 req/day business", cost: "$449/mo", data_types: ["news articles"]}}
      estimate_storage:
        - match: {data_type_contains: "price"}
          response: {content: {estimated_gb: 2, notes: "500 instruments × 252 trading days × 10 years = ~1.26M rows. With indicators: ~5GB."}}
        - match: {data_type_contains: "embeddings"}
          response: {content: {estimated_gb: 15, notes: "1536-dim embeddings × 500K documents. pgvector HNSW index adds 2-3x overhead."}}
        - match: {data_type_contains: "transcripts"}
          response: {content: {estimated_gb: 8, notes: "~2000 transcripts/quarter × 20KB avg. Audio: 50GB+ if stored, recommend text-only."}}
      check_compatibility:
        - match: {source_contains: "pgvector", target_contains: "rag"}
          response: {content: {compatible: true, notes: "pgvector supports HNSW and IVFFlat. Adequate for <1M vectors. Beyond that, consider Qdrant or Pinecone."}}
    scoring:
      architecture_quality:
        weight: 0.3
        method: judge_rubric
        criteria: >
          Clear separation of ingestion, storage, embedding, and retrieval layers.
          Addresses batch vs real-time appropriately for each data type.
      completeness:
        weight: 0.25
        method: checklist
        criteria:
          - "Covers all 4 data sources"
          - "Addresses embedding strategy"
          - "Addresses storage estimates"
          - "Addresses scheduling/orchestration"
          - "Addresses operational simplicity constraint"
      feasibility:
        weight: 0.25
        method: judge_rubric
        criteria: >
          Design is realistic for a single developer. Doesn't over-engineer.
          Acknowledges Supabase limitations and when to graduate components.
      scalability_awareness:
        weight: 0.2
        method: judge_rubric
        criteria: >
          Plants seams for growth (consistent with the pragmatic architecture
          principle) without pre-optimizing.
    max_turns: 14
    timeout_seconds: 180


# =============================================================================
# DIMENSION 3: CODING TASKS
# Tests: code generation, debugging, iteration, test awareness
# Scoring: primarily automated (test suites, linting, type checking)
# =============================================================================

coding_tasks:

  # --- Derived from: MCP Gateway Go proxy service ---
  - id: coding_mcp_easy_01
    dimension: coding
    difficulty: easy
    source_project: mcp-gateway
    description: >
      Implement a Go config loader that reads a servers.yaml file defining
      upstream MCP server connections with auth credentials.
    system_prompt: |
      You are a Go developer building infrastructure tooling.
    tools:
      - type: function
        function:
          name: write_file
          description: "Write content to a file"
          parameters:
            type: object
            properties:
              path: {type: string}
              content: {type: string}
            required: [path, content]
      - type: function
        function:
          name: run_tests
          description: "Run Go tests in a directory"
          parameters:
            type: object
            properties:
              directory: {type: string}
              verbose: {type: boolean}
            required: [directory]
      - type: function
        function:
          name: run_code
          description: "Run a shell command"
          parameters:
            type: object
            properties:
              command: {type: string}
            required: [command]
    user_message: >
      Write a Go package that loads MCP server configuration from a YAML file.
      The config should support: server name, endpoint URL, transport type
      (sse or http), auth type (bearer, api_key, oauth2), auth credentials,
      and an enabled flag. Include validation (URL must be valid, auth type
      must be recognized) and tests.
    test_suite:
      language: go
      tests:
        - name: "TestLoadValidConfig"
          input_file: |
            servers:
              - name: notion
                url: https://mcp.notion.com/mcp
                transport: sse
                auth_type: bearer
                auth_token: "ntn_test123"
                enabled: true
              - name: wooj-brain
                url: https://example.supabase.co/functions/v1/mcp
                transport: http
                auth_type: api_key
                api_key: "sk_test456"
                enabled: true
          expected: "loads 2 servers, both enabled, correct auth types"
        - name: "TestInvalidURL"
          input_file: |
            servers:
              - name: bad
                url: "not-a-url"
                transport: sse
                auth_type: bearer
          expected: "returns validation error"
        - name: "TestUnknownAuthType"
          input_file: |
            servers:
              - name: bad
                url: https://example.com
                transport: sse
                auth_type: "magic"
          expected: "returns validation error for auth_type"
        - name: "TestFilterEnabled"
          input_file: |
            servers:
              - name: active
                url: https://a.com
                transport: sse
                auth_type: bearer
                enabled: true
              - name: disabled

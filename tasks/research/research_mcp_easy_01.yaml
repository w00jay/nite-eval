id: research_mcp_easy_01
dimension: research
difficulty: easy
source_project: mcp-gateway
description: 'Compare two open-source MCP gateway implementations (Docker vs Microsoft) on transport support,
  auth model, and deployment complexity.

  '
system_prompt: 'You are a technical research assistant helping evaluate infrastructure tools.

  '
tools:
- type: function
  function:
    name: web_search
    description: Search the web for technical information
    parameters:
      type: object
      properties:
        query:
          type: string
          description: Search query
      required:
      - query
- type: function
  function:
    name: fetch_url
    description: Fetch the full content of a URL
    parameters:
      type: object
      properties:
        url:
          type: string
          description: URL to fetch
      required:
      - url
user_message: 'Compare Docker''s mcp-gateway and Microsoft''s mcp-gateway on these dimensions: transport
  protocols supported, authentication model, and deployment requirements. Which is better suited for a
  small team running on GKE?

  '
mock_responses:
  web_search:
  - match:
      query_contains: docker mcp-gateway
    response:
      content:
        results:
        - title: docker/mcp-gateway GitHub
          snippet: Go-based MCP proxy. Runs servers in isolated containers. Supports Streamable HTTP.
            Catalog/registry. Profile-based server grouping. Apache 2.0 license.
          url: https://github.com/docker/mcp-gateway
  - match:
      query_contains: Docker MCP
    response:
      content:
        results:
        - title: docker/mcp-gateway GitHub
          snippet: Go-based MCP proxy. Runs servers in isolated containers. Supports Streamable HTTP.
            Catalog/registry. Profile-based server grouping. Apache 2.0 license.
          url: https://github.com/docker/mcp-gateway
  - match:
      query_contains: microsoft mcp-gateway
    response:
      content:
        results:
        - title: microsoft/mcp-gateway GitHub
          snippet: .NET-based. K8s-native with session affinity. Control plane for MCP server lifecycle.
            Enterprise telemetry, access control, observability. Designed for K8s from start.
          url: https://github.com/microsoft/mcp-gateway
  - match:
      query_contains: Microsoft MCP
    response:
      content:
        results:
        - title: microsoft/mcp-gateway GitHub
          snippet: .NET-based. K8s-native with session affinity. Control plane for MCP server lifecycle.
            Enterprise telemetry, access control, observability. Designed for K8s from start.
          url: https://github.com/microsoft/mcp-gateway
  - match:
      query_contains: MCP gateway
    response:
      content:
        results:
        - title: MCP Gateway Comparison
          snippet: Two major open-source MCP gateways available. Docker's is Go-based with container
            isolation. Microsoft's is .NET-based, K8s-native. Both support tool aggregation and auth injection.
  - match:
      query_contains: Model Context Protocol
    response:
      content:
        results:
        - title: Model Context Protocol (MCP) Gateway Implementations
          snippet: MCP standardizes tool access for AI agents. Two gateway implementations exist -
            Docker (Go, container-based) and Microsoft (.NET, K8s-native). Both provide tool aggregation,
            auth injection, and telemetry.
  # Specific org/repo forms used by models that cite the GitHub path.
  - match:
      query_contains: docker/mcp-gateway
    response:
      content:
        results:
        - title: docker/mcp-gateway GitHub
          snippet: Go-based MCP proxy. Streamable HTTP transport. Container-isolated servers.
            OAuth2 and API-key auth for downstream MCP servers. Configured via YAML. Apache 2.0.
          url: https://github.com/docker/mcp-gateway
  - match:
      query_contains: microsoft/mcp-gateway
    response:
      content:
        results:
        - title: microsoft/mcp-gateway GitHub
          snippet: .NET-based MCP gateway, K8s-native with session affinity. OIDC + RBAC auth.
            Streamable HTTP and SSE transports. Helm chart for deploy. Enterprise telemetry via OpenTelemetry.
          url: https://github.com/microsoft/mcp-gateway
  # Fallback: any mcp-gateway query (hyphenated form) resolves to the comparison.
  - match:
      query_contains: mcp-gateway
    response:
      content:
        results:
        - title: MCP Gateway Comparison
          snippet: "Two open-source MCP gateways: docker/mcp-gateway (Go, container-isolated,
            Streamable HTTP, OAuth2/API-key) and microsoft/mcp-gateway (.NET, K8s-native,
            session affinity, OIDC+RBAC, Streamable HTTP + SSE, Helm-based deployment)."
  # Absolute fallback so exploratory queries never miss.
  - match:
      query_contains: any
    response:
      content:
        results:
        - title: MCP Gateway Comparison
          snippet: "Two open-source MCP gateways: docker/mcp-gateway (Go, container-isolated,
            Streamable HTTP, OAuth2/API-key) and microsoft/mcp-gateway (.NET, K8s-native,
            session affinity, OIDC+RBAC, Streamable HTTP + SSE, Helm-based deployment)."
  fetch_url:
  - match:
      url_contains: docker
    response:
      content:
        title: docker/mcp-gateway
        body: "Go-based MCP proxy. Supports Streamable HTTP transport. Runs MCP servers\
          \ in isolated Docker containers. Features: catalog/registry for tool discovery,\
          \ profile-based server grouping, Apache 2.0 license. Requires Docker for\
          \ deployment. Configuration via YAML."
  - match:
      url_contains: microsoft
    response:
      content:
        title: microsoft/mcp-gateway
        body: ".NET-based MCP gateway designed for Kubernetes. Session affinity, control\
          \ plane for server lifecycle management. Enterprise features: telemetry via\
          \ OpenTelemetry, RBAC access control, health monitoring. Helm chart for K8s\
          \ deployment."
  - match:
      url_contains: any
    response:
      content:
        title: Fetched page
        body: "Page content not available in mock environment."
scoring:
  coverage:
    weight: 0.4
    method: checklist
    criteria:
    - Mentions Docker gateway is Go-based
    - Mentions Microsoft gateway is .NET-based
    - Compares transport support
    - Compares auth approach
    - Addresses GKE deployment fit
  accuracy:
    weight: 0.3
    method: judge_rubric
    criteria: Claims match mock search results, no hallucinated features
  recommendation_quality:
    weight: 0.3
    method: judge_rubric
    criteria: Gives a clear, reasoned recommendation for the GKE use case
max_turns: 6
timeout_seconds: 90

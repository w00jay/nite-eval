id: research_finance_hard_01
dimension: research
difficulty: hard
source_project: financial-ai
description: 'Research transformer-based time series models for financial forecasting, comparing foundation
  models (TimesFM, Chronos, Moirai) against fine-tuned specialist models (TFT, PatchTST). Requires multi-source
  synthesis and nuanced technical judgment.

  '
system_prompt: 'You are a quantitative research assistant specializing in ML for finance.

  '
tools:
- type: function
  function:
    name: web_search
    description: Search the web for academic and technical information
    parameters:
      type: object
      properties:
        query:
          type: string
          description: Search query
      required:
      - query
- type: function
  function:
    name: fetch_url
    description: Fetch the full content of a URL
    parameters:
      type: object
      properties:
        url:
          type: string
          description: URL to fetch
      required:
      - url
- type: function
  function:
    name: summarize_findings
    description: Store intermediate research findings
    parameters:
      type: object
      properties:
        topic:
          type: string
        findings:
          type: string
      required:
      - topic
      - findings
- type: function
  function:
    name: create_comparison_table
    description: Create a structured comparison of options
    parameters:
      type: object
      properties:
        title:
          type: string
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
      required:
      - title
      - columns
      - rows
user_message: 'I''m building a multi-asset swing trading system (days to weeks horizon). Research the
  current state of transformer-based time series forecasting models. Compare foundation models (TimesFM,
  Chronos, Moirai, Lag-Llama) against fine-tunable architectures (TFT, PatchTST). For my use case: which
  approach is better, and can I fine-tune a foundation model with PEFT/LoRA on my own financial data?
  Include practical deployment considerations for a single-GPU setup.

  '
mock_responses:
  web_search:
  - match:
      query_contains: TimesFM
    response:
      content:
        results:
        - title: 'TimesFM: Google''s Time Series Foundation Model'
          snippet: 200M param decoder-only. Pre-trained on 100B real-world time points. Zero-shot competitive
            with supervised models. Supports variable context lengths. Apache 2.0.
  - match:
      query_contains: Chronos
    response:
      content:
        results:
        - title: 'Chronos: Amazon''s Probabilistic Time Series Model'
          snippet: T5-based. Tokenizes time series via scaling and quantization. Multiple sizes (20M to
            710M). Strong zero-shot. Probabilistic forecasts. Apache 2.0.
  - match:
      query_contains: PatchTST
    response:
      content:
        results:
        - title: 'PatchTST: Channel-independent Transformer'
          snippet: Patches time series like ViT patches images. Self-supervised pre-training. Channel
            independence enables multi-variate. Strong on long-horizon. IBM Research.
  - match:
      query_contains: financial time series PEFT LoRA
    response:
      content:
        results:
        - title: Fine-tuning Foundation Models for Finance
          snippet: 'LoRA on TimesFM shows 15-20% improvement on domain-specific financial datasets. Key:
            freeze base layers, LoRA rank 8-16 sufficient. Risk of overfitting on small financial datasets.'
  - match:
      query_contains: Temporal Fusion Transformer
    response:
      content:
        results:
        - title: TFT for Multi-horizon Forecasting
          snippet: Google 2021. Variable selection, temporal attention, multi-horizon output. Interpretable
            via attention weights. Requires per-dataset training. Strong on structured time series with
            known covariates.
  - match:
      query_contains: Moirai
    response:
      content:
        results:
        - title: 'Moirai: Salesforce Universal Time Series Forecaster'
          snippet: Masked encoder architecture. Multiple input/output projections handle any frequency.
            Pre-trained on LOTSA (27B observations). Zero-shot SOTA on many benchmarks. Apache 2.0.
  - match:
      query_contains: Lag-Llama
    response:
      content:
        results:
        - title: Lag-Llama Probabilistic Time Series Forecasting
          snippet: LLaMA-based decoder for univariate probabilistic forecasting. Uses lags as covariates.
            Pre-trained on 352 datasets. Strong zero-shot. Lightweight (small parameter count). MIT license.
  - match:
      query_contains: PEFT
    response:
      content:
        results:
        - title: Fine-tuning Foundation Models for Finance
          snippet: 'LoRA on TimesFM shows 15-20% improvement on domain-specific financial datasets. Key:
            freeze base layers, LoRA rank 8-16 sufficient. Risk of overfitting on small financial datasets.'
  - match:
      query_contains: LoRA
    response:
      content:
        results:
        - title: Parameter-Efficient Fine-Tuning for Time Series
          snippet: LoRA and QLoRA applicable to transformer-based time series models. HuggingFace PEFT
            library supports Chronos and TimesFM. Rank 8-16 sufficient for financial domain adaptation.
  - match:
      query_contains: swing trading
    response:
      content:
        results:
        - title: ML for Swing Trading - Practical Considerations
          snippet: Foundation models provide zero-shot baselines. Fine-tuning on 2-5 years of daily data
            improves 10-20%. Key challenges - regime changes, non-stationarity, transaction costs.
            Ensemble approaches (foundation + specialist) show best risk-adjusted returns.
  - match:
      query_contains: GPU
    response:
      content:
        results:
        - title: Time-Series Foundation Model GPU Requirements
          snippet: TimesFM-200M inference <4GB VRAM; fits on consumer GPUs. Chronos-Small (20M) <1GB.
            Chronos-Large (710M) ~3GB inference, 12-16GB training. Moirai-Base ~2GB. Lag-Llama tiny.
            LoRA fine-tuning adds <1GB overhead on top of base model.
  - match:
      query_contains: VRAM
    response:
      content:
        results:
        - title: Transformer Time-Series VRAM Footprint Single-GPU
          snippet: 24GB GPU (e.g., 3090/4090) comfortably handles inference for all major open foundation
            models. LoRA/QLoRA fine-tuning of 200M-710M params feasible with batch 16-32. Full fine-tune
            of 710M requires 40GB+.
  - match:
      query_contains: non-stationarity
    response:
      content:
        results:
        - title: Handling Non-stationarity and Regime Change
          snippet: Financial time series are non-stationary; regime shifts degrade models. Mitigations -
            rolling retraining, regime-conditional features (VIX bucket, yield-curve state), ensembling
            foundation + specialist models, drift monitoring on held-out forecast error.
  - match:
      query_contains: deployment
    response:
      content:
        results:
        - title: Single-GPU Deployment Considerations
          snippet: Batch inference preferred for daily bars. Quantization (INT8) roughly halves VRAM with
            minor accuracy loss. PyTorch 2.x + torch.compile helps. For live swing trading, latency is
            dominated by data pipeline, not model inference.
  - match:
      query_contains: any
    response:
      content:
        results:
        - title: Time-Series Forecasting Literature Overview
          snippet: Transformer-based time-series models split into zero-shot foundation models (TimesFM,
            Chronos, Moirai, Lag-Llama) and fine-tunable specialists (TFT, PatchTST). Trade-offs revolve
            around data volume, domain specificity, and deployment constraints.
  summarize_findings:
  - match:
      topic_contains: any
    response:
      content:
        status: saved
  create_comparison_table:
  - match:
      title_contains: any
    response:
      content:
        status: table_created
scoring:
  technical_depth:
    weight: 0.3
    method: judge_rubric
    criteria: 'Demonstrates understanding of architectural differences (decoder-only vs encoder, patching
      strategy, tokenization approach). Not just listing features but explaining trade-offs.

      '
  practical_judgment:
    weight: 0.3
    method: judge_rubric
    criteria: 'Gives a clear recommendation for the swing trading use case with reasoning. Addresses single-GPU
      deployment constraints. Discusses PEFT/LoRA feasibility honestly.

      '
  coverage:
    weight: 0.2
    method: checklist
    criteria:
    - Covers at least 4 models
    - Addresses zero-shot vs fine-tuned trade-off
    - Discusses PEFT/LoRA for financial data
    - Mentions deployment/inference considerations
  structure:
    weight: 0.2
    method: judge_rubric
    criteria: Well-organized with comparison, not a wall of text
max_turns: 14
max_tool_calls: 14
timeout_seconds: 180

id: coding_wine_medium_01
dimension: coding
difficulty: medium
source_project: wine-tracker
description: 'Implement a Supabase Edge Function that receives a wine label image, calls Claude Vision
  to extract wine metadata, matches against the wine catalog, and returns structured results. Mirrors
  the scan-label flow.

  '
system_prompt: 'You are a TypeScript developer building Supabase Edge Functions.

  '
tools:
- type: function
  function:
    name: write_file
    description: Write content to a file
    parameters:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
      - path
      - content
- type: function
  function:
    name: run_tests
    description: Run TypeScript tests
    parameters:
      type: object
      properties:
        directory:
          type: string
      required:
      - directory
- type: function
  function:
    name: read_file
    description: Read a file's contents
    parameters:
      type: object
      properties:
        path:
          type: string
      required:
      - path
- type: function
  function:
    name: run_code
    description: Run a shell command
    parameters:
      type: object
      properties:
        command:
          type: string
      required:
      - command
user_message: 'Write a Supabase Edge Function (TypeScript, Deno) for the scan-label endpoint. It should:
  (1) accept a base64 image in the request body, (2) upload the image to Supabase Storage, (3) call Claude
  Vision to extract: producer, wine_name, vintage, region, varietal, wine_type, (4) search the wines table
  for a match using trigram similarity on producer + wine_name, (5) return the matched wine or create
  a new entry if no match above 0.6 similarity. Handle errors gracefully — a failed Claude API call should
  return a partial result prompting manual entry, not a 500.

  '
test_suite:
  language: typescript
  tests:
  - name: TestSuccessfulScan
    expected: Returns matched wine with extracted metadata
  - name: TestNewWineCreation
    expected: Creates new wine entry when no match above threshold
  - name: TestClaudeAPIFailure
    expected: Returns 200 with manual_entry_required flag, not 500
  - name: TestInvalidImage
    expected: Returns 400 with user-friendly error message
  - name: TestMissingFields
    expected: Handles partial extraction (e.g., no vintage visible)
scoring:
  test_pass_rate:
    weight: 0.4
    method: automated
  error_handling:
    weight: 0.25
    method: judge_rubric
    criteria: 'Graceful degradation on Claude API failure. User-friendly error messages. No unhandled
      promise rejections. Partial results on incomplete extraction.

      '
  code_quality:
    weight: 0.2
    method: judge_rubric
    criteria: 'TypeScript strict types. No ''any''. Proper Supabase client usage. Thin orchestration pattern
      (DB query → build context → API call → store).

      '
  edge_case_handling:
    weight: 0.15
    method: judge_rubric
    criteria: Handles missing vintage, ambiguous matches, storage upload failure
max_turns: 10
timeout_seconds: 120
mock_responses:
  write_file:
  - match:
      path_contains: any
    response:
      content:
        status: written
        bytes: 1024
  run_tests:
  - match:
      directory_contains: any
    response:
      content:
        passed: 4
        failed: 0
        output: All tests passed
  run_code:
  - match:
      command_contains: any
    response:
      content:
        exit_code: 0
        stdout: ''
        stderr: ''
  read_file:
  - match:
      path_contains: any
    response:
      content:
        content: // file contents placeholder
        exists: true

id: coding_mcp_easy_01
dimension: coding
difficulty: easy
source_project: mcp-gateway
description: 'Implement a Go config loader that reads a servers.yaml file defining upstream MCP server
  connections with auth credentials.

  '
system_prompt: 'You are a Go developer building infrastructure tooling.

  '
tools:
- type: function
  function:
    name: write_file
    description: Write content to a file
    parameters:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
      - path
      - content
- type: function
  function:
    name: run_tests
    description: Run Go tests in a directory
    parameters:
      type: object
      properties:
        directory:
          type: string
        verbose:
          type: boolean
      required:
      - directory
- type: function
  function:
    name: run_code
    description: Run a shell command
    parameters:
      type: object
      properties:
        command:
          type: string
      required:
      - command
user_message: 'Write a Go package that loads MCP server configuration from a YAML file. The config should
  support: server name, endpoint URL, transport type (sse or http), auth type (bearer, api_key, oauth2),
  auth credentials, and an enabled flag. Include validation (URL must be valid, auth type must be recognized)
  and tests.

  '
mock_responses:
  write_file:
  - match:
      path_contains: any
    response:
      content:
        status: written
        bytes: 1024
  run_tests:
  - match:
      directory_contains: any
    response:
      content:
        passed: 4
        failed: 0
        output: 'ok  \tconfig\t0.003s'
  run_code:
  - match:
      command_contains: any
    response:
      content:
        exit_code: 0
        stdout: ''
        stderr: ''
test_suite:
  language: go
  tests:
  - name: TestLoadValidConfig
    input_file: "servers:\n  - name: notion\n    url: https://mcp.notion.com/mcp\n    transport: sse\n\
      \    auth_type: bearer\n    auth_token: \"ntn_test123\"\n    enabled: true\n  - name: wooj-brain\n\
      \    url: https://example.supabase.co/functions/v1/mcp\n    transport: http\n    auth_type: api_key\n\
      \    api_key: \"sk_test456\"\n    enabled: true\n"
    expected: loads 2 servers, both enabled, correct auth types
  - name: TestInvalidURL
    input_file: "servers:\n  - name: bad\n    url: \"not-a-url\"\n    transport: sse\n    auth_type: bearer\n"
    expected: returns validation error
  - name: TestUnknownAuthType
    input_file: "servers:\n  - name: bad\n    url: https://example.com\n    transport: sse\n    auth_type:\
      \ \"magic\"\n"
    expected: returns validation error for auth_type
  - name: TestFilterEnabled
    input_file: "servers:\n  - name: active\n    url: https://a.com\n    transport: sse\n    auth_type:\
      \ bearer\n    enabled: true\n  - name: disabled\n    url: https://b.com\n    transport: sse\n  \
      \  auth_type: bearer\n    enabled: false\n"
    expected: EnabledServers() returns only 1 server
scoring:
  test_pass_rate:
    weight: 0.5
    method: automated
    criteria: pass@1 on test suite
  code_quality:
    weight: 0.3
    method: judge_rubric
    criteria: 'Idiomatic Go: exported types with documentation, proper error wrapping, yaml struct tags,
      no panics in library code.

      '
  go_vet_clean:
    weight: 0.2
    method: automated
    criteria: go vet passes with no issues
max_turns: 6
timeout_seconds: 90

id: agentic_finance_hard_01
dimension: agentic
difficulty: hard
source_project: financial-ai
description: 'Multi-agent investment analysis: gather price data, check news sentiment, retrieve earnings
  context via RAG, assess macro conditions, and synthesize a trade recommendation. Tests long-horizon
  agent loop with 6+ tool calls, conditional branching, and result chaining.

  '
system_prompt: 'You are an investment research agent. You follow a systematic process:

  gather quantitative signals, layer on qualitative context, assess macro

  environment, then synthesize a recommendation. Be explicit about

  confidence levels and what data supports each claim.

  '
tools:
- type: function
  function:
    name: get_price_data
    description: Get historical OHLCV price data for an instrument
    parameters:
      type: object
      properties:
        symbol:
          type: string
        period:
          type: string
          enum:
          - 1d
          - 5d
          - 1mo
          - 3mo
          - 1y
        interval:
          type: string
          enum:
          - 1h
          - 1d
          - 1wk
      required:
      - symbol
      - period
- type: function
  function:
    name: get_technical_indicators
    description: Calculate technical indicators for a symbol
    parameters:
      type: object
      properties:
        symbol:
          type: string
        indicators:
          type: array
          items:
            type: string
            enum:
            - rsi
            - macd
            - bollinger
            - sma_50
            - sma_200
            - atr
      required:
      - symbol
      - indicators
- type: function
  function:
    name: search_news
    description: Search recent financial news with sentiment scores
    parameters:
      type: object
      properties:
        query:
          type: string
        days_back:
          type: integer
          default: 7
      required:
      - query
- type: function
  function:
    name: rag_search
    description: Search the financial knowledge base (earnings transcripts, filings, analyst reports)
    parameters:
      type: object
      properties:
        query:
          type: string
        doc_types:
          type: array
          items:
            type: string
            enum:
            - earnings_transcript
            - 10k
            - 10q
            - analyst_report
        limit:
          type: integer
          default: 5
      required:
      - query
- type: function
  function:
    name: get_macro_indicators
    description: Get current macro economic indicators
    parameters:
      type: object
      properties:
        indicators:
          type: array
          items:
            type: string
            enum:
            - fed_funds_rate
            - cpi
            - pmi
            - vix
            - yield_curve
            - unemployment
      required:
      - indicators
- type: function
  function:
    name: calculate_position_size
    description: Calculate recommended position size based on risk parameters
    parameters:
      type: object
      properties:
        symbol:
          type: string
        entry_price:
          type: number
        stop_loss:
          type: number
        portfolio_value:
          type: number
        max_risk_pct:
          type: number
          default: 0.02
      required:
      - symbol
      - entry_price
      - stop_loss
      - portfolio_value
- type: function
  function:
    name: social_media_sentiment
    description: Get social media sentiment from Reddit/Twitter
    parameters:
      type: object
      properties:
        ticker:
          type: string
      required:
      - ticker
user_message: 'Analyze NVDA for a potential swing trade entry. I have a $100K portfolio and standard 2%
  risk per trade. Give me a full analysis with entry, stop, target, and position size — but only if the
  setup is actually good. Don''t force a trade if the data doesn''t support it.

  '

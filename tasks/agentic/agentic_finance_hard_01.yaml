expected_tools_called:
- get_price_data
- get_technical_indicators
- search_news
- rag_search
- get_macro_indicators
- calculate_position_size
scoring:
  tool_coverage:
    weight: 0.2
    method: subset_match
    criteria: 'Called all 5 core tools (price, technicals, news, RAG, macro). Position sizing optional
      (depends on whether setup is recommended).

      '
  analysis_structure:
    weight: 0.25
    method: judge_rubric
    criteria: 'Follows systematic process: quantitative → qualitative → macro → synthesis. Each section
      references specific data from tool responses.

      '
  judgment_quality:
    weight: 0.25
    method: judge_rubric
    criteria: 'Makes a clear recommendation (long/short/wait) with explicit reasoning. Addresses the conflicting
      signals (strong fundamentals vs export risk vs technical pullback). States confidence level. If
      recommending entry, provides specific price levels.

      '
  data_accuracy:
    weight: 0.15
    method: deterministic
    criteria: 'All numbers cited (RSI, price, ATR, revenue growth) match mock data. No hallucinated statistics.

      '
  distractor_handling:
    weight: 0.15
    method: deterministic
    criteria: 'Either did not call social_media_sentiment (preferred — low signal for institutional-quality
      analysis) or appropriately discounted it. Did NOT weight Reddit sentiment as a primary signal.

      '
max_turns: 16
timeout_seconds: 180

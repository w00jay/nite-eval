      symbol: NVDA
    response:
      content:
        rsi: 38.5
        macd:
          value: -1.2
          signal: -0.8
          histogram: -0.4
        bollinger:
          upper: 155
          middle: 145
          lower: 135
          position: near_lower
        sma_50: 148.2
        sma_200: 128.5
